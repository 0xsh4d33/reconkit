services:
  reconkit:
    build: .
    image: reconkit:latest
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - reconkit-data:/data
      - reconkit-scan-results:/scan_results
      - reconkit-reports:/reports
      - reconkit-screenshots:/screenshots
    cap_add:
      - NET_RAW
      - NET_ADMIN
    user: root
    restart: unless-stopped
    dns:
      - ${AD_DNS_IP}
    dns_search:
      - ${AD_DNS_SEARCH}

volumes:
  reconkit-data:
  reconkit-scan-results:
  reconkit-reports:
  reconkit-screenshots:
