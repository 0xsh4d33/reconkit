database:
  path: ./data/recon.db

workers:
  discovery: 20
  nmap: 10
  httpx: 50
  eyewitness: 5

nmap:
  arguments:
    - -sV
    - --open
    - -T4

httpx:
  threads: 50
  ports:
    - 80
    - 443
    - 8080
    - 8443
    - 8000
    - 8888

eyewitness:
  enabled: true
  path: /path/to/EyeWitness
  python: /path/to/EyeWitness/eyewitness-venv/bin/python

subfinder:
  enabled: true

paths:
  scan_results: ./scan_results
  screenshots: ./screenshots
  reports: ./reports

web:
  host: "127.0.0.1"
  port: 8080
