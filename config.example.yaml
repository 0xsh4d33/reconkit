database:
  path: ./data/recon.db

workers:
  discovery: 20

nmap:
  arguments:
    - -sV
    - --open
    - -T4

httpx:
  threads: 50
  ports:
    - 80
    - 443
    - 8080
    - 8443
    - 8000
    - 8888

subfinder:
  enabled: true

paths:
  scan_results: ./scan_results
  screenshots: ./screenshots
  reports: ./reports

web:
  host: "127.0.0.1"
  port: 8080
