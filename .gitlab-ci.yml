variables:
  GO_VERSION: "1.22"
  GOLANGCI_LINT_VERSION: "v1.60.3"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

cache:
  paths:
    - .sonar/cache
    - go/pkg/mod
    - .cache/go-build

stages:
  - verify
  - test
  - security
  - sonar
  - build
  - deploy


#############################
# Lint
#############################

golangci-lint:
  stage: verify
  image: golangci/golangci-lint:${GOLANGCI_LINT_VERSION}
  script:
    - golangci-lint run ./...
  allow_failure: false

#############################
# Unit Tests
#############################

unit-test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go mod download
    - go test ./... -v -coverprofile=coverage.out
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week

#############################
# Security Scan
#############################

gosec:
  stage: security
  image: golang:${GO_VERSION}
  before_script:
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
  script:
    - gosec -fmt=sonarqube -out=gosec-report.json ./...
  artifacts:
    when: always
    paths:
      - gosec-report.json

#############################
# SonarQube
#############################

sonarqube:
  stage: sonar
  image:
#    name: sonarsource/sonar-scanner-cli:latest
    name: nexus.pivdenny.ua:5000/docker/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_TOKEN: "$SONAR_LOGIN"  # TOKEN генерируется при создании проекта в sonarqube
    SONAR_HOST_URL: "$SONAR_URL"
    GIT_DEPTH: 0
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  
  dependencies:
    - unit-test
    - gosec
  script:
    - echo "$KOSHER_CERT" > /usr/local/share/ca-certificates/ca-piv.crt
    - update-ca-certificates
    - sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.projectName=${CI_PROJECT_NAME}
      -Dsonar.sources=.
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.go.coverage.reportPaths=coverage.out
      -Dsonar.externalIssuesReportPaths=gosec-report.json
      -Dsonar.scm.provider=git
      -Dsonar.qualitygate.wait=true
  allow_failure: false
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  only: # Обнаруживать только основные запросы на слияние и отправку основного кода ветки, версия sonarqube-ce поддерживает только анализ основных веток
    - merge_requests
    - develop
    - hotfix
    - master
    - main
    - /^release-.*$/
    - /^hotfix-.*$/



#############################
# Build
#############################

build:
  stage: build
  image: golang:${GO_VERSION}
  script:
    - mkdir -p build
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/app .
  artifacts:
    paths:
      - build/app

#############################
# Docker Build
#############################

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main

#############################
# Deploy
#############################

deploy-prod:
  stage: deploy
  script:
    - echo "Deploy application"
  environment:
    name: production
  only:
    - main

